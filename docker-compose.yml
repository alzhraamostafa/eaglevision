version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: eaglevision-zookeeper
    user: root
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_DATA_DIR: /var/lib/zookeeper/data
      ZOOKEEPER_LOG_DIR: /var/lib/zookeeper/log
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: eaglevision-kafka
    user: root
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eaglevision-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eaglevision
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: eaglevision-timescaledb
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-eaglevision}
      POSTGRES_USER: ${DB_USER:-eaglevision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eaglevision123}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eaglevision} -d ${DB_NAME:-eaglevision}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cv_service:
    build:
      context: ./cv_service
      dockerfile: Dockerfile
    container_name: eaglevision-cv
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./sample_data:/data
      - frame_buffer:/frames
    restart: on-failure

  kafka_consumer:
    build:
      context: ./kafka_consumer
      dockerfile: Dockerfile
    container_name: eaglevision-consumer
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: timescaledb
    restart: on-failure

  video_server:
    build:
      context: ./video_server
      dockerfile: Dockerfile
    container_name: eaglevision-video
    ports:
      - "5000:5000"
    volumes:
      - frame_buffer:/frames
    restart: on-failure

  grafana:
    image: grafana/grafana:10.4.0
    container_name: eaglevision-grafana
    user: root
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,marcusolsson-dynamictext-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  timescale_data:
  grafana_data:
  frame_buffer:
